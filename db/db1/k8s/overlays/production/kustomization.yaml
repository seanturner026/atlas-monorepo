apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: db1

resources:
  - ../../resources/job.yaml
  - ../../resources/service.yaml
  - ../../resources/serviceaccount.yaml
  - ../../resources/statefulset.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: atlas-config
    literals:
      - ATLAS_ENV=default
      - DATABASE_URL=postgres://postgres:postgres@db1-postgres.db1.svc.cluster.local:5432/db1?sslmode=disable
  - name: postgres-config
    literals:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_DB=db1
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
